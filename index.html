<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🦊 Мессенджер Скам | Приватный чат</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0c12;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes messagePop {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease;
            background: #0a0c12;
        }

        .screen.hidden {
            transform: translateX(100%);
            pointer-events: none;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
            padding: 32px 24px;
            overflow-y: auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-icon {
            font-size: 80px;
            margin-bottom: 16px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 12px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            background: rgba(30, 34, 46, 0.5);
            border-radius: 60px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #9ca3af;
            font-size: 15px;
            font-weight: 600;
            border-radius: 60px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab.active {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(30, 34, 46, 0.9);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: #ffffff;
            font-size: 16px;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f97316;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            margin-top: 8px;
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
        }

        .btn:disabled {
            opacity: 0.6;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            padding: 12px 16px;
            border-radius: 16px;
            color: #fca5a5;
            font-size: 13px;
            margin-top: 12px;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid #22c55e;
            padding: 12px 16px;
            border-radius: 16px;
            color: #4ade80;
            font-size: 13px;
            margin-top: 12px;
        }

        .info-message {
            background: rgba(249, 115, 22, 0.08);
            border-left: 3px solid #f97316;
            padding: 12px 16px;
            border-radius: 16px;
            color: #fdba74;
            font-size: 12px;
            margin-top: 12px;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0f111a;
        }

        .chat-header {
            background: rgba(26, 30, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header-info h2 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .chat-header-info .status {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            color: #10b981;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            font-size: 20px;
            padding: 10px;
            border-radius: 50%;
            color: #ffffff;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #2a2e3e;
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            display: flex;
            gap: 10px;
            animation: messagePop 0.2s ease;
        }

        .message-mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-other {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: #2a2e3e;
        }

        .avatar canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .message-content {
            max-width: calc(100% - 46px);
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
        }

        .message-mine .message-bubble {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-other .message-bubble {
            background: rgba(42, 46, 58, 0.9);
            color: #ffffff;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            text-align: right;
        }

        .system-message {
            text-align: center;
            color: #4b5563;
            font-size: 11px;
            padding: 8px;
        }

        .input-area {
            background: rgba(26, 30, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-area textarea {
            flex: 1;
            background: rgba(42, 46, 58, 0.9);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 12px 18px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #f97316;
        }

        .input-area textarea:disabled {
            opacity: 0.5;
        }

        .send-btn {
            background: linear-gradient(135deg, #f97316, #ef4444);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 1000;
            pointer-events: none;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .footer {
            position: fixed;
            bottom: 12px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: #374151;
        }

        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="screen">
        <div class="login-container">
            <div class="logo">
                <div class="logo-icon">🦊</div>
                <h1>Мессенджер Скам</h1>
                <p>Приватный чат. Твоя безопасность.</p>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="login">🔐 Вход</button>

                </div>
                <div class="input-group">
                    <label>🔑 Пароль</label>

    <div id="chatScreen" class="screen hidden">
        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-header-info">
                    <h2>🦊 Мессенджер Скам</h2>
                    <div class="status">
                        <span class="status-dot"></span>
                        <span id="connectionStatus">Подключено</span>
                    </div>
                </div>

                    <button class="icon-btn" id="logoutBtn" title="Выйти">🚪</button>

            </div>
            
            <div class="messages-area" id="messagesArea">
                <div class="system-message">🦊 Добро пожаловать в Мессенджер Скам</div>

            <div class="input-area">
                <textarea id="messageInput" placeholder="Сообщение... (Enter → отправить)" rows="1"></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_TOKEN = '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';
        const MESSAGES_GIST_ID = '61a22fec7f08506b53a61831ec029569';
        const USERS_GIST_ID = '2528232ef8b216f397d4fd8f6e3a3f6f';
        
        const MESSAGE_COOLDOWN = 1000;
        const MAX_MESSAGES_PER_MINUTE = 30;
        
        let currentUsername = null;
        let currentSeed = null;
        let pollingInterval = null;
        let avatarCache = new Map();
        let existingMessageIds = new Set();
        
        let lastMessageTime = 0;
        let messageCountThisMinute = 0;
        let messageCountResetTime = Date.now();
        
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        
        function generateGravatar(username, size = 36) {
            try {
                const hash = CryptoJS.SHA256(username).toString();
                
                const hue1 = parseInt(hash.substr(0, 2), 16) % 360;
                const hue2 = (parseInt(hash.substr(2, 2), 16) % 360 + 180) % 360;
                const saturation = 60 + (parseInt(hash.substr(4, 2), 16) % 35);
                const lightness = 55 + (parseInt(hash.substr(6, 2), 16) % 20);
                
                const color1 = `hsl(${hue1}, ${saturation}%, ${lightness}%)`;
                const color2 = `hsl(${hue2}, ${saturation}%, ${lightness - 15}%)`;
                
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = color1;
                ctx.fillRect(0, 0, size, size);
                
                const gridSize = 5;
                const cellSize = size / gridSize;
                
                const patternBits = [];
                for (let i = 0; i < 25; i++) {
                    const byteIndex = Math.floor(i / 8);
                    const bitIndex = i % 8;
                    const byte = parseInt(hash.substr(byteIndex * 2, 2), 16);
                    patternBits.push((byte >> bitIndex) & 1);
                }
                
                const center = Math.floor(gridSize / 2);
                for (let row = 0; row < gridSize; row++) {
                    for (let col = 0; col <= center; col++) {
                        const shouldDraw = patternBits[row * gridSize + col] === 1;
                        if (shouldDraw) {
                            ctx.fillStyle = color2;
                            ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                            if (col !== center) {
                                const mirrorCol = gridSize - 1 - col;
                                ctx.fillRect(mirrorCol * cellSize, row * cellSize, cellSize, cellSize);
                            }
                        }
                    }
                }
                
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1;
                ctx.strokeRect(0, 0, size, size);
                
                return canvas;
            } catch (error) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#4b5563';
                ctx.fillRect(0, 0, size, size);
                return canvas;
            }
        }
        
        function getAvatarElement(username, size = 36) {
            const key = `${username}_${size}`;
            if (avatarCache.has(key)) {
                return avatarCache.get(key).cloneNode(true);
            }
            
            const canvas = generateGravatar(username, size);
            const container = document.createElement('div');
            container.className = 'avatar';
            container.appendChild(canvas);
            
            avatarCache.set(key, container.cloneNode(true));
            return container.cloneNode(true);
        }
        
        function createMessageElement(msg) {
            const isMine = msg.username === currentUsername;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isMine ? 'message-mine' : 'message-other'}`;
            messageDiv.setAttribute('data-message-id', msg.id);
            
            const time = new Date(msg.timestamp);
            const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const avatar = getAvatarElement(msg.username, 36);
            const safeText = escapeHtml(msg.text);
            const safeUsername = escapeHtml(msg.username);
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-bubble" data-message-text="${safeText.replace(/"/g, '&quot;')}">
                        ${!isMine ? `<div class="message-sender">${safeUsername}</div>` : ''}
                        <div>${safeText}</div>
                        <div class="message-time">${timeStr}</div>
                    </div>
                </div>
            `;
            
            if (isMine) {
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.insertBefore(avatar, messageDiv.firstChild);
            }
            
            const bubble = messageDiv.querySelector('.message-bubble');
            bubble.addEventListener('click', (e) => {
                e.stopPropagation();
                const text = bubble.dataset.messageText;
                if (text) {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('📋 Скопировано');
                    }).catch(() => {});
                }
            });
            
            return messageDiv;
        }
        
        function addNewMessages(messages) {
            const newMessages = messages.filter(msg => !existingMessageIds.has(msg.id));
            if (newMessages.length === 0) return false;
            
            const wasAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop <= messagesArea.clientHeight + 100;
            
            newMessages.forEach(msg => {
                const messageElement = createMessageElement(msg);
                messagesArea.appendChild(messageElement);
                existingMessageIds.add(msg.id);
            });
            
            if (wasAtBottom) {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
            return true;
        }
        
        function fullRender(messages) {
            messagesArea.innerHTML = '<div class="system-message">🦊 Добро пожаловать в Мессенджер Скам</div>';
            existingMessageIds.clear();
            
            messages.forEach(msg => {
                const messageElement = createMessageElement(msg);
                messagesArea.appendChild(messageElement);
                existingMessageIds.add(msg.id);
            });
            
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function canSendMessage() {
            const now = Date.now();
            
            if (now - lastMessageTime < MESSAGE_COOLDOWN) {
                showToast(`⏳ Подожди 1 секунду`);
                return false;
            }
            
            if (now - messageCountResetTime > 60000) {
                messageCountThisMinute = 0;
                messageCountResetTime = now;
            }
            
            if (messageCountThisMinute >= MAX_MESSAGES_PER_MINUTE) {
                showToast(`🚫 Слишком много сообщений (${MAX_MESSAGES_PER_MINUTE} в минуту)`);
                return false;
            }
            
            return true;
        }
        
        function recordMessageSent() {
            lastMessageTime = Date.now();
            messageCountThisMinute++;
        }
        
        function showToast(text) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function showMessage(element, text, type) {
            element.innerHTML = `<div class="${type}-message">${text}</div>`;
            setTimeout(() => {
                if (element.innerHTML.includes(text)) element.innerHTML = '';
            }, 5000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function hashPassword(password) {
            return CryptoJS.SHA256(password).toString();
        }
        
        async function fetchGist(gistId) {
            const url = `https://api.github.com/gists/${gistId}?_=${Date.now()}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!response.ok) throw new Error(`Ошибка ${response.status}`);
            return await response.json();
        }
        
        async function updateGist(gistId, content, filename) {
            const payload = {
                files: {
                    [filename]: {
                        content: JSON.stringify(content, null, 2)
                    }
                }
            };
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`Ошибка ${response.status}`);
            return await response.json();
        }
        
        async function getUsers() {
            try {
                const gist = await fetchGist(USERS_GIST_ID);
                const file = gist.files['users.json'];
                if (!file || !file.content) return {};
                return JSON.parse(file.content);
            } catch (error) {
                return {};
            }
        }
        
        async function saveUsers(users) {
            return await updateGist(USERS_GIST_ID, users, 'users.json');
        }
        
        async function registerUser(username, password) {
            if (!username || !password) return { success: false, error: 'Заполните все поля' };
            if (!/^[a-zA-Z0-9а-яА-ЯёЁ_]+$/.test(username)) return { success: false, error: 'Некорректный логин' };
            if (username.length < 3) return { success: false, error: 'Логин минимум 3 символа' };
            if (password.length < 4) return { success: false, error: 'Пароль минимум 4 символа' };
            
            const users = await getUsers();
            if (users[username]) return { success: false, error: 'Логин уже занят' };
            
            users[username] = {
                passwordHash: hashPassword(password),
                createdAt: Date.now()
            };
            
            await saveUsers(users);
            return { success: true };
        }
        
        async function loginUser(username, password) {
            const users = await getUsers();
            const user = users[username];
            if (!user) return { success: false, error: 'Пользователь не найден' };
            if (user.passwordHash !== hashPassword(password)) return { success: false, error: 'Неверный пароль' };
            return { success: true };
        }
        
        async function getMessages() {
            try {
                const gist = await fetchGist(MESSAGES_GIST_ID);
                const file = gist.files['messages.json'];
                if (!file || !file.content) return [];
                const messages = JSON.parse(file.content);
                return Array.isArray(messages) ? messages : [];
            } catch (error) {
                return [];
            }
        }
        
        async function updateMessages(content) {
            return await updateGist(MESSAGES_GIST_ID, content, 'messages.json');
        }
        
        function encryptMessage(text, seed) {
            return CryptoJS.AES.encrypt(text, seed).toString();
        }
        
        function decryptMessage(encrypted, seed) {
            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, seed);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                return decrypted || null;
            } catch (e) {
                return null;
            }
        }
        
        async function loadAndDecryptMessages() {
            const allMessages = await getMessages();
            const myMessages = [];
            
            for (const msg of allMessages) {
                const decrypted = decryptMessage(msg.text, currentSeed);
                if (decrypted) {
                    myMessages.push({
                        ...msg,
                        text: decrypted
                    });
                }
            }
            return myMessages;
        }
        
        async function sendMessage(text) {
            if (!text.trim()) return false;
            if (!canSendMessage()) return false;
            if (text.trim().length > 2000) {
                showToast('📏 Сообщение слишком длинное (макс 2000 символов)');
                return false;
            }
            
            sendBtn.disabled = true;
            messageInput.disabled = true;
            
            const encrypted = encryptMessage(text.trim(), currentSeed);
            const newMessage = {
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                username: currentUsername,
                text: encrypted,
                timestamp: Date.now()
            };
            
            try {
                const allMessages = await getMessages();
                allMessages.push(newMessage);
                while (allMessages.length > 2000) allMessages.shift();
                await updateMessages(allMessages);
                recordMessageSent();
                
                const decryptedMsg = { ...newMessage, text: text.trim() };
                const msgElement = createMessageElement(decryptedMsg);
                messagesArea.appendChild(msgElement);
                existingMessageIds.add(newMessage.id);
                messagesArea.scrollTop = messagesArea.scrollHeight;
                
                return true;
            } catch (error) {
                showToast('❌ Ошибка отправки');
                return false;
            } finally {
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }
        
        async function refreshMessages() {
            if (!currentSeed) return;
            try {
                const messages = await loadAndDecryptMessages();
                if (existingMessageIds.size === 0 && messages.length > 0) {
                    fullRender(messages);
                } else {
                    addNewMessages(messages);
                }
                connectionStatus.textContent = 'Подключено';
                connectionStatus.style.color = '#10b981';
            } catch (error) {
                connectionStatus.textContent = 'Ошибка';
                connectionStatus.style.color = '#ef4444';
            }
        }
        
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                if (currentSeed) refreshMessages();
            }, 3000);
        }
        
        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }
        
        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const seed = document.getElementById('loginSeed').value.trim();
            
            if (!username || !password || !seed) {
                showMessage(document.getElementById('loginMessage'), '❌ Заполните все поля', 'error');
                return;
            }
            
            const authResult = await loginUser(username, password);
            if (!authResult.success) {
                showMessage(document.getElementById('loginMessage'), '❌ ' + authResult.error, 'error');
                return;
            }
            
            stopPolling();
            
            currentUsername = username;
            currentSeed = seed;
            
            localStorage.setItem('scam_user', username);
            localStorage.setItem('scam_pass', password);
            localStorage.setItem('scam_seed', seed);
            
            lastMessageTime = 0;
            messageCountThisMinute = 0;
            messageCountResetTime = Date.now();
            existingMessageIds.clear();
            
            const messages = await loadAndDecryptMessages();
            fullRender(messages);
            
            startPolling();
            
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            messageInput.focus();
        }
        
        async function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const password2 = document.getElementById('regPassword2').value.trim();
            
            if (password !== password2) {
                showMessage(document.getElementById('registerMessage'), '❌ Пароли не совпадают', 'error');
                return;
            }
            
            const result = await registerUser(username, password);
            if (!result.success) {
                showMessage(document.getElementById('registerMessage'), '❌ ' + result.error, 'error');
                return;
            }
            
            showMessage(document.getElementById('registerMessage'), '✅ Регистрация успешна! Теперь войдите.', 'success');
            document.querySelector('.tab[data-tab="login"]').click();
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = password;
            document.getElementById('loginSeed').focus();
        }
        
        function logout() {
            stopPolling();
            currentUsername = null;
            currentSeed = null;
            avatarCache.clear();
            existingMessageIds.clear();
            
            loginScreen.classList.remove('hidden');
            chatScreen.classList.add('hidden');
            
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginSeed').value = '';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPassword2').value = '';
            
            messagesArea.innerHTML = '<div class="system-message">🦊 Добро пожаловать в Мессенджер Скам</div>';
        }
        
        function attachButtonListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.removeEventListener('click', tab._handler);
                tab._handler = (e) => {
                    e.preventDefault();
                    const tabName = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById('loginForm').classList.remove('active');
                    document.getElementById('registerForm').classList.remove('active');
                    document.getElementById(`${tabName}Form`).classList.add('active');
                    document.getElementById('loginMessage').innerHTML = '';
                    document.getElementById('registerMessage').innerHTML = '';
                };
                tab.addEventListener('click', tab._handler);
                tab.addEventListener('touchstart', tab._handler);
            });
            
            const loginBtn = document.getElementById('doLoginBtn');
            loginBtn.removeEventListener('click', loginBtn._handler);
            loginBtn.removeEventListener('touchstart', loginBtn._handler);
            loginBtn._handler = (e) => {
                e.preventDefault();
                doLogin();
            };
            loginBtn.addEventListener('click', loginBtn._handler);
            loginBtn.addEventListener('touchstart', loginBtn._handler);
            
            const registerBtn = document.getElementById('doRegisterBtn');
            registerBtn.removeEventListener('click', registerBtn._handler);
            registerBtn.removeEventListener('touchstart', registerBtn._handler);
            registerBtn._handler = (e) => {
                e.preventDefault();
                doRegister();
            };
            registerBtn.addEventListener('click', registerBtn._handler);
            registerBtn.addEventListener('touchstart', registerBtn._handler);
            
            logoutBtn.removeEventListener('click', logoutBtn._handler);
            logoutBtn.removeEventListener('touchstart', logoutBtn._handler);
            logoutBtn._handler = (e) => {
                e.preventDefault();
                logout();
            };
            logoutBtn.addEventListener('click', logoutBtn._handler);
            logoutBtn.addEventListener('touchstart', logoutBtn._handler);
            
            sendBtn.removeEventListener('click', sendBtn._handler);
            sendBtn.removeEventListener('touchstart', sendBtn._handler);
            sendBtn._handler = async (e) => {
                e.preventDefault();
                const text = messageInput.value.trim();
                if (text) {
                    const success = await sendMessage(text);
                    if (success) {
                        messageInput.value = '';
                        messageInput.style.height = 'auto';
                    }
                }
            };
            sendBtn.addEventListener('click', sendBtn._handler);
            sendBtn.addEventListener('touchstart', sendBtn._handler);
        }
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        attachButtonListeners();
        
        const savedUser = localStorage.getItem('scam_user');
        const savedPass = localStorage.getItem('scam_pass');
        const savedSeed = localStorage.getItem('scam_seed');
        if (savedUser && savedPass && savedSeed) {
            document.getElementById('loginUsername').value = savedUser;
            document.getElementById('loginPassword').value = savedPass;
            document.getElementById('loginSeed').value = savedSeed;
            setTimeout(() => doLogin(), 100);
        }
    </script>
</body>
</html>
